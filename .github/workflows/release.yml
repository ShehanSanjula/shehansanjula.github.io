name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }} - 2026 Stable
          body: |
             ## 🚀 **New Release: ${{ github.ref_name }}**
             
             **2026 Stable Release with Seasonal Themes**
             
             ### ✨ Features
             - **Automatic Seasonal Decorations**:
               - 🎄 **Christmas** (Nov-Dec): Snow, Santa, Tree.
               - 🌞 **New Year** (Mar-Apr): Erabadu Tree, Koha, Butterfly.
               - ☸️ **Vesak** (May): Lanterns, Lotus Scene.
               - ☸️ **Poson** (Jun): Lanterns, Lotus Scene (with custom Poson greeting title).
             - **Optimized UI**:
               - Removed seasonal decorations/animations from mobile versions (displays only on desktop, laptop, and computer screens).
               - Greeting badge matches website theme (Dark/Teal or Gold).
             - **Documentation**: Updated README badges.

             Enjoy the new festive updates! 🎉
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
